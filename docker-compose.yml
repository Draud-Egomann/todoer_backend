services:
  todoer-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoer-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - todoer-data:/root/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  todoer-data:
    driver: local
